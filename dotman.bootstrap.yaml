- defaults:
    shell:
      stdout: true
      stderr: true

- shell:
    - command: brew bundle --file packages/Brewfile
      description: Install Homebrew packages
      if: command -v brew >/dev/null
    - command: '"$(brew --prefix ruby)/bin/gem" install try-cli --no-document --install-dir "$HOME/.local/share/gem" --bindir "$HOME/.local/bin"'
      description: Install try experiment manager
      if: command -v brew >/dev/null 2>&1 && ! command -v try >/dev/null 2>&1
    - command: packages/install-maple-mono-linux.sh
      description: Install Maple Mono NF CN on Linux
      if: test "$(uname -s)" = Linux
