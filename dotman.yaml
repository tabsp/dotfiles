# dotman v2 config — sync tool, source of truth for this machine.
# Plan/Confirm/Run flow in TUI; per-machine selection in ~/.local/share/dotman/state.toml.
#
# Profile management (repo URL, clone, sync) is handled by dotman's own profile
# system (~/.config/dotman/config.toml), not by this file.

# Per-platform package manager
package_managers:
  macos:   brew
  ubuntu:  brew
  debian:  brew
  arch:    pacman
  fedora:  dnf

# Auto-install pkg manager if missing (idempotent: skips if already present).
auto_install_pkg_manager: true

# Set login shell after fish is installed. dotman resolves the actual path with
# `command -v fish` during deploy, so this stays portable across Homebrew/Linux.
default_shell: fish

# 1. Terminal / 2. Shell / 3. Multiplexer / 4. Software / 5. Enhancement
install:
  # 1. Terminal
  - ghostty
  # 2. Shell
  - fish
  # 3. Multiplexer
  - tmux
  # 4. Software
  - neovim
  - lazygit
  - btop
  - fastfetch
  - yazi
  - mise
  # 5. Enhancement
  - ripgrep
  - fd
  - bat
  - eza
  - jq
  - yq
  - starship
  - tealdeer
  - direnv
  - dua-cli
  - fzf
  - gum
  - ruby
  - zoxide
  - font-maple-mono-nf-cn

# All link targets in one block; layer indicated by comment.
links:
  # 1. Terminal
  ~/.config/ghostty:        config/ghostty
  # 2. Shell
  ~/.config/fish:           config/fish
  # 3. Multiplexer
  ~/.tmux.conf:             config/tmux.conf
  ~/.local/bin/tmux-status: bin/tmux-status
  # 4. Software
  ~/.config/nvim:           config/nvim
  ~/.config/btop:           config/btop
  ~/.config/fastfetch:      config/fastfetch
  # 5. Enhancement
  ~/.config/starship.toml:  config/starship.toml
  ~/.config/tealdeer:       config/tealdeer

# Directories to ensure exist.
create:
  - ~/.config/fish/local.d  # 2. Shell (fish local config)
  - ~/Workspace/tries       # standalone workspace

# Misc shell sync (idempotent / optional).
shell:
  - command: fish -lc 'type -q fisher; or curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source; and fisher update'
    description: Sync fish plugins
    optional: true
    if: command -v fish >/dev/null 2>&1
  - command: TEALDEER_CONFIG_DIR="$HOME/.config/tealdeer" tldr --update
    description: Update tealdeer pages
    optional: true
    if: command -v tldr >/dev/null 2>&1
