- defaults:
    link:
      create: true
      relink: true
      relative: true
      backup: true
    shell:
      stdout: true
      stderr: true

- link:
    ~/.config/fish:
      path: config/fish
    ~/.config/nvim: config/nvim
    ~/.config/ghostty: config/ghostty
    ~/.config/btop:
      path: config/btop
    ~/.config/fastfetch:
      path: config/fastfetch
    ~/.config/starship.toml:
      path: config/starship.toml
    ~/.config/tealdeer:
      path: config/tealdeer
    ~/.local/bin/tmux-status: bin/tmux-status
    ~/.tmux.conf: config/tmux.conf

- create:
    - ~/.config/fish/local.d
    - ~/Workspace/tries

- shell:
    - command: fish -lc 'type -q fisher; or curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source; and fisher update'
      description: Sync fish plugins
      optional: true
      if: command -v fish >/dev/null 2>&1
    - command: TEALDEER_CONFIG_DIR="$HOME/.config/tealdeer" tldr --update
      description: Update tealdeer pages
      optional: true
      if: command -v tldr >/dev/null 2>&1
