# dotman config — sync tool, source of truth for this machine.
# Plan/Review/Run flow in TUI; selection lives under ~/.local/share/dotman/selection/.
#
# Profile management (repo URL, clone, sync) is handled by dotman's own profile
# system (~/.config/dotman/config.toml), not by this file.

# Per-platform package manager
package_managers:
  macos: brew
  ubuntu: brew
  debian: brew
  arch: pacman
  fedora: dnf

# Auto-install pkg manager if missing (idempotent: skips if already present).
auto_install_pkg_manager: true

# Set login shell after fish is installed. dotman resolves the actual path with
# `command -v fish` during deploy, so this stays portable across Homebrew/Linux.
default_shell: fish

# 1. Terminal / 2. Shell / 3. Multiplexer / 4. Software / 5. Enhancement
install:
  # 1. Terminal
  - ghostty
  # 2. Shell
  - fish
  # 3. Multiplexer
  - tmux
  - herdr
  # 4. Software
  - neovim
  - lazygit
  - btop
  - fastfetch
  - yazi
  - mise
  # 5. Enhancement
  - ripgrep
  - tree-sitter-cli
  - fd
  - bat
  - eza
  - jq
  - yq
  - starship
  - tealdeer
  - direnv
  - dua-cli
  - fzf
  - gum
  - zoxide
  - font-maple-mono-nf-cn

# All link targets in one block; layer indicated by comment.
links:
  # 1. Terminal
  ~/.config/ghostty: config/ghostty
  # 2. Shell
  ~/.config/fish: config/fish
  # 3. Multiplexer
  ~/.tmux.conf: config/tmux.conf
  ~/.local/bin/tmux-status: bin/tmux-status
  ~/.config/herdr: config/herdr
  # 4. Software
  ~/.config/nvim: config/nvim
  ~/.config/btop: config/btop
  ~/.config/fastfetch: config/fastfetch
  # 5. Enhancement
  ~/.config/starship.toml: config/starship.toml
  ~/.markdownlint-cli2.yaml: config/markdownlint-cli2.yaml
  ~/.config/tealdeer: config/tealdeer
  ~/.config/mise/config.toml: config/mise/config.toml

# Directories to ensure exist.
create:
  - ~/.config/fish-local # 2. Shell (preferred machine-local overrides)
  - ~/Workspace/tries # standalone workspace

# Misc shell sync (idempotent / optional).
shell:
  - command: fish -lc 'type -q fisher; or curl -fsSL https://raw.githubusercontent.com/jorgebucaran/fisher/4.4.8/functions/fisher.fish | source; and fisher update'
    description: Sync fish plugins
    optional: true
    if: command -v fish >/dev/null 2>&1
  - command: >-
      if [ ! -d "$HOME/.tmux/plugins/tpm/.git" ]; then
        git clone --filter=blob:none https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm";
      fi &&
      if [ "$(git -C "$HOME/.tmux/plugins/tpm" rev-parse HEAD)" != "99469c4a9b1ccf77fade25842dc7bafbc8ce9946" ]; then
        git -C "$HOME/.tmux/plugins/tpm" fetch --depth=1 origin 99469c4a9b1ccf77fade25842dc7bafbc8ce9946 &&
        git -C "$HOME/.tmux/plugins/tpm" checkout --detach 99469c4a9b1ccf77fade25842dc7bafbc8ce9946;
      fi &&
      "$HOME/.tmux/plugins/tpm/bin/install_plugins"
    description: Install pinned TPM and sync tmux plugins
    optional: true
    if: command -v tmux >/dev/null 2>&1 && command -v git >/dev/null 2>&1
  - command: env MISE_TRUSTED_CONFIG_PATHS="$HOME/.config/mise/config.toml" mise install
    description: Install mise-managed runtimes
    optional: true
    if: command -v mise >/dev/null 2>&1
  - command: env -u GEM_HOME -u GEM_PATH MISE_TRUSTED_CONFIG_PATHS="$HOME/.config/mise/config.toml" mise exec ruby -- gem install try-cli --no-document
    description: Install try CLI
    optional: true
    if: command -v mise >/dev/null 2>&1 && ! env -u GEM_HOME -u GEM_PATH MISE_TRUSTED_CONFIG_PATHS="$HOME/.config/mise/config.toml" mise exec ruby -- gem list -i try-cli >/dev/null 2>&1
