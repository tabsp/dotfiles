# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color" # modern tmux terminfo with truecolor
set-option -g terminal-overrides "linux*:AX@"
set -as terminal-features ",xterm*:RGB"
setw -g xterm-keys on
set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on
set -g set-clipboard on
set -g allow-passthrough on
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u

unbind C-b
set -g prefix C-x
bind C-x send-prefix

set -g history-limit 100000               # boost history

# reload configuration
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'


# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title
set -g status-keys emacs      # emacs bindings in tmux command prompt
setw -g aggressive-resize on  # resize windows for the smallest attached client

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

# activity
set -g monitor-activity on
set -g visual-activity off

# mouse
set -g mouse on


# -- navigation ----------------------------------------------------------------

# create session
bind C-c command-prompt -p "session name:" { if -F "#{==:%%,}" "new-session -c '#{pane_current_path}'" "new-session -c '#{pane_current_path}' -s '%%'" }

# find session
bind C-f display-popup -E "tmux list-sessions -F '#S' | fzf --prompt='session> ' --height=100% | xargs tmux switch-client -t"

# split current window horizontally
bind - split-window -v -c "#{pane_current_path}"
# split current window vertically
bind _ split-window -h -c "#{pane_current_path}"

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Unified resize: resize Vim splits inside Vim, tmux panes elsewhere.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n M-h if-shell "$is_vim" "send-keys M-h" "resize-pane -L 2"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j" "resize-pane -D 2"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k" "resize-pane -U 2"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l" "resize-pane -R 2"

# window navigation
unbind n
unbind p
bind -r C-h previous-window # select previous window
bind -r C-l next-window     # select next window
bind Tab last-window        # move to last active window
set -g @vim_navigator_prefix_mapping_clear_screen ''


# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode # enter copy mode

setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line


# -- buffers -------------------------------------------------------------------

bind b list-buffers  # list paste buffers
bind p paste-buffer  # paste from the top paste buffer
bind P choose-buffer # choose which buffer to paste from


# -- status line -------------------------------------------------------------------

# tmux-mode-indicator
set -g @mode_indicator_empty_prompt ' ◇ '
set -g @mode_indicator_empty_mode_style 'bg=#1e1e2e,fg=#89b4fa'
set -g @mode_indicator_prefix_prompt ' ◈ '
set -g @mode_indicator_prefix_mode_style 'bg=#89b4fa,fg=#1e1e2e'
set -g @mode_indicator_copy_prompt '  '
set -g @mode_indicator_copy_mode_style 'bg=#a6e3a1,fg=#1e1e2e'
set -g @mode_indicator_sync_prompt '   '
set -g @mode_indicator_sync_mode_style 'bg=#89dceb,fg=#1e1e2e'

set -g status "on"
set -g status-interval 5
set -g status-position bottom
set -g status-right-length 100
set -g status-justify left
set -g status-style "bg=terminal,fg=#89b4fa"
set -g status-left '#{tmux_mode_indicator}'
set -g status-right '#{?#{m/r:^(⠋|⠙|⠹|⠸|⠼|⠴|⠦|⠧|⠇|⠏),#{pane_title}},#[bg=terminal]#[fg=#f9e2af]#{=1:pane_title} ,}#(tmux-status)'
setw -g window-status-format " #[bg=#45475a,fg=#cdd6f4,noreverse]▓░ #W "
setw -g window-status-current-format " #[bg=#89b4fa,fg=#1e1e2e,noreverse]▓░ #W "


# -- plugins -------------------------------------------------------------------

set -g @continuum-restore 'on'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-continuum'

# TPM is installed during dotman deploy so tmux startup never performs network
# operations. Gracefully skip plugin loading on a machine not deployed yet.
if-shell "test -x ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'"
