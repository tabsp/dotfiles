add_newline = true
command_timeout = 500
format = "$directory$git_branch$git_status$character"

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[✗](bold #f38ba8)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
style = "bold #89b4fa"
repo_root_style = "bold #94e2d5"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[on](#6c7086) [$symbol$branch]($style) "
symbol = " "
style = "bold #f5c2e7"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bold #f9e2af"
ahead = "⇡${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
behind = "⇣${count} "
conflicted = " "
untracked = "? "
modified = "! "
stashed = ""
staged = "+ "
renamed = "» "
deleted = "✘ "
