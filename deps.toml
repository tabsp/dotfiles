[deps.git]
command = "git"

[deps.git.version_check]
args = ["--version"]
regex = 'git version ([0-9]+\.[0-9]+\.[0-9]+)'
stream = "stdout"

[deps.git.mac.arm64]
installer = "system"
version = "latest"

[deps.git.mac.x86_64]
installer = "system"
version = "latest"

[deps.git.linux.arm64]
installer = "apt"
version = "latest"

[deps.git.linux.arm64.params]
package = "git"

[deps.git.linux.x86_64]
installer = "apt"
version = "latest"

[deps.git.linux.x86_64.params]
package = "git"

[deps.tmux]
command = "tmux"

[deps.tmux.version_check]
args = ["-V"]
regex = 'tmux ([0-9]+\.[0-9]+)'
stream = "stdout"

[deps.tmux.mac.arm64]
installer = "brew"
version = "latest"
source = "https://github.com/tmux/tmux"

[deps.tmux.mac.arm64.params]
package = "tmux"

[deps.tmux.mac.x86_64]
installer = "brew"
version = "latest"
source = "https://github.com/tmux/tmux"

[deps.tmux.mac.x86_64.params]
package = "tmux"

[deps.tmux.linux.arm64]
installer = "apt"
version = "latest"

[deps.tmux.linux.arm64.params]
package = "tmux"

[deps.tmux.linux.x86_64]
installer = "apt"
version = "latest"

[deps.tmux.linux.x86_64.params]
package = "tmux"

[deps.fish]
command = "fish"

[deps.fish.version_check]
args = ["--version"]
regex = 'fish, version ([0-9]+\.[0-9]+\.[0-9]+)'
stream = "stdout"

[deps.fish.mac.arm64]
installer = "brew"
version = "latest"
source = "https://fishshell.com/"

[deps.fish.mac.arm64.params]
package = "fish"

[deps.fish.mac.x86_64]
installer = "brew"
version = "latest"
source = "https://fishshell.com/"

[deps.fish.mac.x86_64.params]
package = "fish"

[deps.fish.linux.arm64]
installer = "apt"
version = "latest"
source = "https://fishshell.com/"

[deps.fish.linux.arm64.params]
package = "fish"

[deps.fish.linux.x86_64]
installer = "apt"
version = "latest"
source = "https://fishshell.com/"

[deps.fish.linux.x86_64.params]
package = "fish"

[deps.ghostty]
command = "ghostty"

[deps.ghostty.mac.arm64]
installer = "cask"
version = "latest"
source = "https://ghostty.org/"

[deps.ghostty.mac.arm64.params]
package = "ghostty"

[deps.ghostty.mac.x86_64]
installer = "cask"
version = "latest"
source = "https://ghostty.org/"

[deps.ghostty.mac.x86_64.params]
package = "ghostty"

