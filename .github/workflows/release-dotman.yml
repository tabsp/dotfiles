name: Release dotman

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Semantic release tag matching Cargo.toml (for example v0.3.3)
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(awk '
            $0 == "[package]" { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && $1 == "version" { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.toml)
          test "$RELEASE_TAG" = "v$package_version"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Prettier
        run: npm install --global prettier@3.9.5

      - name: Install lint tools
        shell: bash
        run: |
          brew_bin="$(command -v brew || true)"
          if [[ -z "$brew_bin" && -x /home/linuxbrew/.linuxbrew/bin/brew ]]; then
            brew_bin=/home/linuxbrew/.linuxbrew/bin/brew
          fi
          if [[ -z "$brew_bin" ]]; then
            echo "Homebrew not found" >&2
            exit 1
          fi
          eval "$("$brew_bin" shellenv)"
          brew_prefix="$("$brew_bin" --prefix)"
          echo "$brew_prefix/bin" >> "$GITHUB_PATH"
          echo "$brew_prefix/sbin" >> "$GITHUB_PATH"
          "$brew_bin" install fish shellcheck hadolint actionlint jq neovim stylua gitleaks

      - run: make ci

  homebrew-tap-preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Require Homebrew Tap deploy key
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: test -n "$HOMEBREW_TAP_DEPLOY_KEY"

      - name: Check out Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: tabsp/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

  build:
    needs:
      - test
      - homebrew-tap-preflight
    strategy:
      fail-fast: false
      # Keep this target list in sync with scripts/build-site.sh manifest generation.
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if cargo build --release --target ${{ matrix.target }}; then
              exit 0
            fi
            echo "build attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          exit 1

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/dotman" dist/package/dotman
          chmod 755 dist/package/dotman
          tar -C dist/package -czf "dist/dotman-${{ matrix.target }}.tar.gz" dotman
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/dotman-${{ matrix.target }}.tar.gz" > "dist/dotman-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "dist/dotman-${{ matrix.target }}.tar.gz" > "dist/dotman-${{ matrix.target }}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dotman-${{ matrix.target }}
          path: |
            dist/dotman-${{ matrix.target }}.tar.gz
            dist/dotman-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: dotman ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/dotman-*.tar.gz
            dist/dotman-*.tar.gz.sha256
            scripts/install.sh

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check out Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: tabsp/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Formula
        env:
          DOTMAN_CHECKSUM_DIR: dist
        run: scripts/update-homebrew-formula.sh "$RELEASE_TAG" homebrew-tap/Formula/dotman.rb

      - name: Set up Homebrew
        shell: bash
        run: |
          set -euo pipefail
          brew_bin="$(command -v brew || true)"
          if [[ -z "$brew_bin" && -x /home/linuxbrew/.linuxbrew/bin/brew ]]; then
            brew_bin=/home/linuxbrew/.linuxbrew/bin/brew
          fi
          if [[ -z "$brew_bin" ]]; then
            echo "Homebrew not found" >&2
            exit 1
          fi
          eval "$("$brew_bin" shellenv)"
          brew_prefix="$("$brew_bin" --prefix)"
          echo "$brew_prefix/bin" >> "$GITHUB_PATH"
          echo "$brew_prefix/sbin" >> "$GITHUB_PATH"

      - name: Validate Formula syntax and style
        run: |
          set -euo pipefail
          ruby -c homebrew-tap/Formula/dotman.rb
          brew style homebrew-tap/Formula/dotman.rb

      - name: Register Formula test Tap
        run: |
          set -euo pipefail
          brew tap-new tabsp/tap
          cp homebrew-tap/Formula/dotman.rb "$(brew --repository tabsp/tap)/Formula/dotman.rb"

      - name: Install and test Formula
        run: |
          set -euo pipefail
          brew install tabsp/tap/dotman
          brew test tabsp/tap/dotman

      - name: Publish Formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git add Formula/dotman.rb
          if git diff --cached --quiet; then
            echo "Formula is already current."
            exit 0
          fi
          git commit -m "chore: update dotman to ${RELEASE_TAG#v}"
          git push
