name: Release dotman

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install lint tools
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
            echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
            echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          fi
          brew install fish shellcheck hadolint actionlint jq

      - run: make ci

  build:
    needs: test
    strategy:
      fail-fast: false
      # Keep this target list in sync with scripts/build-site.sh manifest generation.
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if cargo build --release --target ${{ matrix.target }}; then
              exit 0
            fi
            echo "build attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          exit 1

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/dotman" dist/package/dotman
          chmod 755 dist/package/dotman
          tar -C dist/package -czf "dist/dotman-${{ matrix.target }}.tar.gz" dotman
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/dotman-${{ matrix.target }}.tar.gz" > "dist/dotman-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "dist/dotman-${{ matrix.target }}.tar.gz" > "dist/dotman-${{ matrix.target }}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dotman-${{ matrix.target }}
          path: |
            dist/dotman-${{ matrix.target }}.tar.gz
            dist/dotman-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'dotman-latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'dotman latest' }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/dotman-*.tar.gz
            dist/dotman-*.tar.gz.sha256
