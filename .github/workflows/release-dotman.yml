name: Release dotman

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # Keep this target list in sync with scripts/build-site.sh manifest generation.
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/dotman" dist/package/dotman
          chmod 755 dist/package/dotman
          tar -C dist/package -czf "dist/dotman-${{ matrix.target }}.tar.gz" dotman
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/dotman-${{ matrix.target }}.tar.gz" > "dist/dotman-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "dist/dotman-${{ matrix.target }}.tar.gz" > "dist/dotman-${{ matrix.target }}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dotman-${{ matrix.target }}
          path: |
            dist/dotman-${{ matrix.target }}.tar.gz
            dist/dotman-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'dotman-latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'dotman latest' }}
          files: |
            dist/dotman-*.tar.gz
            dist/dotman-*.tar.gz.sha256
