# Tool install database.
#
# dotman.yaml is the software list. This file only defines command templates
# and per-tool exceptions that cannot be inferred from the tool name.

default_platforms = ["brew", "apt", "pacman", "dnf"]

[templates.brew]
command = "brew install {package}"

[templates.brew_cask]
command = "brew install --cask {package}"
platform = "brew"
os = ["macos"]

[templates.apt]
command = "sudo apt install -y {package}"

[templates.pacman]
command = "sudo pacman -S --needed --noconfirm {package}"

[templates.dnf]
command = "sudo dnf install -y {package}"

[templates.ubuntu_ghostty]
command = 'sudo -n apt-get update -qq && sudo -n env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/mkasberg/ghostty-ubuntu/HEAD/install.sh)"'
platform = "ubuntu"
os = ["ubuntu"]

[templates.fedora_ghostty]
command = "sudo dnf copr enable -y scottames/ghostty && sudo dnf install -y ghostty"
platform = "fedora"
os = ["fedora"]

[templates.herdr_direct_macos]
command = "curl -fsSL https://herdr.dev/install.sh | sh"
platform = "macos"
os = ["macos"]

[templates.herdr_direct_linux]
command = "curl -fsSL https://herdr.dev/install.sh | sh"
platform = "linux"
os = ["linux"]

[tools.ghostty]
layer = "terminal"
platforms = ["brew_cask", "ubuntu_ghostty", "pacman", "fedora_ghostty"]

[tools.kitty]
layer = "terminal"
platforms = ["brew_cask"]

[tools.fish]
layer = "shell"

[tools.tmux]
layer = "multiplexer"

[tools.herdr]
layer = "multiplexer"
platforms = ["brew", "herdr_direct_macos", "herdr_direct_linux"]

[tools.neovim]
binary = "nvim"
layer = "software"

[tools.lazygit]
layer = "software"
platforms = ["brew", "pacman", "dnf"]

[tools.btop]
layer = "software"

[tools.fastfetch]
layer = "software"

[tools.yazi]
layer = "software"
platforms = ["brew", "pacman"]

[tools.mise]
layer = "software"

[tools.ripgrep]
binary = "rg"
layer = "enhancement"

[tools.fd]
layer = "enhancement"

[tools.fd.packages]
apt = "fd-find"
dnf = "fd-find"

[tools.bat]
layer = "enhancement"

[tools.eza]
layer = "enhancement"
platforms = ["brew", "pacman"]

[tools.jq]
layer = "enhancement"

[tools.yq]
layer = "enhancement"
platforms = ["brew", "apt", "pacman"]

[tools.starship]
layer = "enhancement"
platforms = ["brew", "pacman", "dnf"]

[tools.tealdeer]
binary = "tldr"
layer = "enhancement"

[tools.direnv]
layer = "enhancement"

[tools.dua-cli]
binary = "dua"
layer = "enhancement"

[tools.fzf]
layer = "enhancement"

[tools.gum]
layer = "enhancement"

[tools.ruby]
layer = "enhancement"

[tools.zoxide]
layer = "enhancement"

[tools.font-maple-mono-nf-cn]
