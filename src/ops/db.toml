# Tool database. ~20 entries covering the user's actual tools.
# Each tool has: name, binary (for command -v), layer, per-package-manager
# install commands.
#
# Adding a tool: append a [[tools]] block. Platform selection happens in
# dotman.yaml; this database maps package-manager keys to install commands.

[[tools]]
name = "ghostty"
binary = "ghostty"
layer = "terminal"

[tools.platforms.brew]
command = "brew install --cask ghostty"
os = ["macos"]

[[tools]]
name = "kitty"
binary = "kitty"
layer = "terminal"

[tools.platforms.brew]
command = "brew install --cask kitty"
os = ["macos"]

[[tools]]
name = "fish"
binary = "fish"
layer = "shell"

[tools.platforms.brew]
command = "brew install fish"
[tools.platforms.apt]
command = "sudo apt install -y fish"
[tools.platforms.pacman]
command = "sudo pacman -S --needed --noconfirm fish"
[tools.platforms.dnf]
command = "sudo dnf install -y fish"

